<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Wix App SDK — required for widget to render inside Wix editor -->
  <script src="https://static.parastorage.com/services/js-sdk/1.388.0/app-sdk.js"></script>

  <script src="./pro-filter-gallery.js" defer></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      overflow-x: hidden;
    }

    body {
      font-family: Inter, Arial, sans-serif;
    }

    pro-filter-gallery {
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>
  <pro-filter-gallery></pro-filter-gallery>

<script>
  window.onload = function () {
    const gallery = document.querySelector("pro-filter-gallery");
    const STORAGE_KEY = "pro_filter_gallery_settings_v2";

    function applySettingsToGallery(payload) {
      if (!gallery || !payload) return;

      if (typeof gallery.applySettings === "function") {
        gallery.applySettings(payload);
        return;
      }

      if (payload.projects) {
        gallery.setAttribute("projects", JSON.stringify(payload.projects));
      }
    }

    // 1. Bootstrap from saved settings immediately
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const savedState = JSON.parse(raw);
        applySettingsToGallery(savedState);
      }
    } catch (e) {
      console.warn("Could not read saved widget state", e);
    }

    // 2. Listen for Wix native settings updates
    if (window.Wix && Wix.addEventListener) {
      Wix.addEventListener(Wix.Events.SETTINGS_UPDATED, function (message) {
        applySettingsToGallery(message);
      });

      try {
        Wix.reportAppLoaded();
      } catch (e) {}

      function reportHeight() {
        try {
          Wix.setHeight(document.body.scrollHeight);
        } catch (e) {}
      }

      reportHeight();

      const observer = new ResizeObserver(reportHeight);
      observer.observe(document.body);
    }

    // 3. Listen for settings panel live updates
    window.addEventListener("message", function (event) {
      if (event?.data?.type === "PRO_FILTER_GALLERY_SETTINGS_UPDATED") {
        applySettingsToGallery(event.data.payload);
      }
    });

    window.addEventListener("storage", function (event) {
  if (event.key === STORAGE_KEY && event.newValue) {
    try {
      const savedState = JSON.parse(event.newValue);
      applySettingsToGallery(savedState);
    } catch (e) {
      console.warn("Could not sync widget from storage event", e);
    }
  }
});
  };
</script>
</body>
</html>
