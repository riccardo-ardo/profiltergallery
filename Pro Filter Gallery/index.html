<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Wix App SDK — required for widget to render inside Wix editor -->
  <script src="https://static.parastorage.com/services/js-sdk/1.388.0/app-sdk.js"></script>

  <script src="./pro-filter-gallery.js" defer></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      overflow-x: hidden;
    }

    body {
      font-family: Inter, Arial, sans-serif;
    }

    pro-filter-gallery {
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>
  <pro-filter-gallery></pro-filter-gallery>

<script>
  window.onload = function () {
    if (window.Wix && Wix.addEventListener) {
      try {
        Wix.reportAppLoaded();
      } catch (e) {}

      function reportHeight() {
        try {
          Wix.setHeight(document.body.scrollHeight);
        } catch (e) {}
      }

      reportHeight();

      const observer = new ResizeObserver(reportHeight);
      observer.observe(document.body);
    }
  };
</script>
</body>
</html>
