<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://static.parastorage.com/services/js-sdk/1.388.0/app-sdk.js"></script>
  <script src="./pro-filter-gallery.js" defer></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      overflow-x: hidden;
    }

    body {
      font-family: Inter, Arial, sans-serif;
    }

    pro-filter-gallery {
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>
  <pro-filter-gallery id="gallery"></pro-filter-gallery>

  <script>
    window.onload = function () {
      const gallery = document.getElementById("gallery");

      Wix.getSiteInfo(function (info) {
        if (gallery && info && info.instance) {
          gallery.setAttribute("instance", info.instance);
        }
      });

      Wix.addEventListener(Wix.Events.SETTINGS_UPDATED, function (message) {
        if (gallery && message) {
          console.log("Settings updated:", message);
        }
      });

      Wix.reportAppLoaded();

      function reportHeight() {
        Wix.setHeight(document.body.scrollHeight);
      }

      reportHeight();

      const observer = new ResizeObserver(reportHeight);
      observer.observe(document.body);
    };
  </script>
</body>
</html>
