<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pro Filter Gallery – Local Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="./pro-filter-gallery.js" defer></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #06070a;
      min-height: 100%;
    }

    pro-filter-gallery {
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>
  <pro-filter-gallery></pro-filter-gallery>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const gallery = document.querySelector("pro-filter-gallery");

      gallery.setAttribute("projects", JSON.stringify([
        {
          id: "p_1",
          title: "Studio Direction",
          category: "Branding",
          description: "A premium identity system built around texture, restraint, and luxury positioning.",
          coverImage: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80",
          galleryImages: [
            "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80",
            "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1200&q=80"
          ],
          visible: true
        },
        {
          id: "p_2",
          title: "Luxury Commerce",
          category: "Web",
          description: "A high-end e-commerce interface focused on clarity, hierarchy, and conversion-led design.",
          coverImage: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1200&q=80",
          galleryImages: [
            "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1200&q=80"
          ],
          visible: true
        }
      ]));

      gallery.setAttribute("accent", "#7c9cff");
      gallery.setAttribute("columns", "3");
      gallery.setAttribute("gap", "16");
      gallery.setAttribute("radius", "20");
      gallery.setAttribute("cardpanelbg", "#111722");
      gallery.setAttribute("textpanelstyle", "fade");
      gallery.setAttribute("overlaystrength", "72");
      gallery.setAttribute("showcategory", "true");
      gallery.setAttribute("showfilters", "true");
      gallery.setAttribute("enablemodal", "true");
      gallery.setAttribute("titlesize", "medium");
      gallery.setAttribute("descsize", "medium");
      gallery.setAttribute("categorysize", "medium");
      gallery.setAttribute("modalimagefit", "cover");
    });
  </script>
</body>
</html>
